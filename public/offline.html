<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline — ShopERP</title>
    <style>
        body { font-family: system-ui, sans-serif; display: flex; align-items: center;
               justify-content: center; min-height: 100vh; margin: 0; background: #f3f4f6; }
        .box { text-align: center; padding: 2rem; background: white; border-radius: 1rem;
               box-shadow: 0 4px 24px rgba(0,0,0,.1); max-width: 360px; }
        h1 { color: #1e3a5f; font-size: 1.5rem; margin-bottom: .5rem; }
        p  { color: #6b7280; margin-bottom: 1.5rem; }
        button { background: #1e3a5f; color: white; border: none; padding: .75rem 2rem;
                 border-radius: .75rem; font-size: 1rem; cursor: pointer; }
        button:hover { background: #2d4f7c; }
    </style>
</head>
<body>
    <div class="box">
        <div style="font-size:3rem;margin-bottom:1rem">📡</div>
        <h1>You're offline</h1>
        <p>ShopERP needs an internet connection. Please check your network and try again.</p>
        <button onclick="location.reload()">Try Again</button>
    </div>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
</body>
</html>
